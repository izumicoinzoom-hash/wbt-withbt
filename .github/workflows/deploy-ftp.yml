name: Deploy kiyota via FTP

on:
  push:
    branches:
      - main
    paths:
      - 'public_html/.htaccess'
      - 'public_html/kiyota/**'
      - 'public_html/demodeta/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy kiyota to Xserver via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public_html/
          server-dir: ${{ format('{0}{1}', secrets.FTP_REMOTE_DIR, endsWith(secrets.FTP_REMOTE_DIR, '/') && '' || '/') }}
          # ルート .htaccess、kiyota、demodeta をデプロイ
          include: |
            .htaccess
            kiyota/.htaccess
            kiyota/index.html
            kiyota/assets/**
            kiyota/estimator/**
            demodeta/**
          dangerous-clean-slate: false
