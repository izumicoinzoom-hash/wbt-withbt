name: Deploy to Xserver via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy public_html to Xserver via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public_html/
          server-dir: ${{ format('{0}{1}', secrets.FTP_REMOTE_DIR, endsWith(secrets.FTP_REMOTE_DIR, '/') && '' || '/') }}
          # トップ・研修LP・kiyota・demodeta など指定パスのみデプロイ（WordPress等は除外）
          include: |
            .htaccess
            .user.ini
            *.html
            *.md
            mail_to_owner.php
            images/**
            data/**
            kiyota/.htaccess
            kiyota/index.html
            kiyota/assets/**
            kiyota/estimator/**
            kiyota/demo/**
            demodeta/**
          dangerous-clean-slate: false
