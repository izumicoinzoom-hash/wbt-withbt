# GitHub に push すると Xserver の public_html にデプロイする
# 必須: Secrets に SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, DEPLOY_PATH
# SSH_PORT は省略時 10022（Xserver 既定）を使用
name: Deploy to Xserver
on:
  push:
    branches:
      - main
    paths:
      - 'public_html/.htaccess'
      - 'public_html/kiyota/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_PORT: ${{ vars.SSH_PORT || secrets.SSH_PORT || '10022' }}
      SSH_HOST: ${{ vars.SSH_HOST || secrets.SSH_HOST }}
      SSH_USER: ${{ vars.SSH_USER || secrets.SSH_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" "echo 'SSH OK'"

      - name: Deploy .htaccess to Xserver (scp)
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -P "$SSH_PORT" \
            public_html/.htaccess \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Deploy kiyota to Xserver (scp)
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -P "$SSH_PORT" -r \
            public_html/kiyota \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
