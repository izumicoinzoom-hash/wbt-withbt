<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BrightBoard - 清田自動車 工程管理</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" crossorigin src="./assets/index-Bg01vFlb.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BdGBjdvu.css">
  </head>
  <body>
    <noscript>
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;font-family:sans-serif;background:#f9fafb;color:#374151;">
        <p>BrightBoard を利用するには JavaScript を有効にしてください。</p>
      </div>
    </noscript>
    <div id="root">
      <div id="app-loading" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f9fafb;color:#374151;box-sizing:border-box;">
        <p style="margin:0 0 12px 0;font-size:14px;">読み込み中...</p>
        <div style="width:28px;height:28px;border:2px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:bb-spin 0.7s linear infinite;"></div>
      </div>
    </div>
    <style>@keyframes bb-spin{to{transform:rotate(360deg);}}</style>
    <script>
      (function(){
        var el = document.getElementById('app-loading');
        function showErr(msg) {
          if (!el) return;
          el.innerHTML = '<p style="margin:0 0 12px 0;font-size:14px;color:#dc2626;">' + (msg || '読み込みに失敗しました') + '</p><button type="button" onclick="location.reload()" style="padding:10px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;">再読み込み</button>';
        }
        window.addEventListener('error', function(e) {
          if (e.message) showErr(e.message);
          else if (e.filename && e.filename.indexOf('assets/') !== -1) showErr('スクリプトの読み込みに失敗しました。ネットワークを確認してください。');
        });
        window.addEventListener('unhandledrejection', function(e) { showErr(e.reason && (e.reason.message || String(e.reason))); });
      })();
    </script>
  </body>
</html>
